<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毎日ことばクイズ 🌟</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    color: white;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem;
    margin-bottom: 20px;
    text-align: center;
  }

  .date-badge {
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  /* ── Tab ── */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .tab-btn {
    padding: 10px 28px;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.25);
    color: white;
  }

  .tab-btn.active {
    background: white;
    color: #764ba2;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  /* ── Cards ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }

  .word-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .word-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.2); }

  .word-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--accent);
  }

  .word-card .emoji { font-size: 2.2rem; margin-bottom: 8px; }

  .word-card .jp-word {
    font-size: 1.1rem;
    color: #555;
    margin-bottom: 10px;
  }

  .lang-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .flag { font-size: 1.3rem; }

  .word-text {
    font-size: 1.25rem;
    font-weight: bold;
  }

  .phonetic {
    font-size: 0.85rem;
    color: #666;
    margin-top: 2px;
    font-weight: 500;
  }

  .en-color { color: #2d6be4; }
  .kr-color { color: #e44040; }

  .learned-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: #4caf50;
    color: white;
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .word-card.learned .learned-badge { opacity: 1; }

  /* ── Progress bar ── */
  .progress-wrap {
    width: 100%;
    max-width: 900px;
    margin-bottom: 18px;
  }

  .progress-label {
    color: white;
    font-size: 0.9rem;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar-bg {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    height: 12px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: #f9ca24;
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  /* ── Quiz ── */
  .quiz-wrap {
    width: 100%;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .quiz-card {
    background: white;
    border-radius: 24px;
    padding: 36px 28px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .quiz-question-emoji { font-size: 3.5rem; margin-bottom: 12px; }

  .quiz-question-text {
    font-size: 1.8rem;
    font-weight: bold;
    color: #333;
    margin-bottom: 6px;
  }

  .quiz-hint { color: #888; font-size: 0.9rem; margin-bottom: 24px; }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .option-btn {
    padding: 12px 8px;
    border: 2.5px solid #ddd;
    border-radius: 14px;
    background: white;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    color: #333;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: #764ba2;
    background: #f3eeff;
  }

  .option-btn.correct { border-color: #4caf50; background: #e8f5e9; }
  .option-btn.wrong   { border-color: #f44336; background: #ffebee; }

  .opt-en { color: #2d6be4; font-size: 1rem; }
  .opt-kr { color: #e44040; font-size: 1rem; }
  .opt-ph { color: #888; font-size: 0.75rem; font-weight: normal; }

  .quiz-result {
    font-size: 1.3rem;
    font-weight: bold;
    padding: 12px 20px;
    border-radius: 12px;
    text-align: center;
    animation: pop 0.3s ease;
  }

  .quiz-result.ok  { background: #e8f5e9; color: #2e7d32; }
  .quiz-result.ng  { background: #ffebee; color: #c62828; }

  @keyframes pop {
    0%   { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }

  .next-btn {
    padding: 14px 40px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(102,126,234,0.5);
    transition: transform 0.15s;
  }

  .next-btn:hover { transform: scale(1.05); }

  .score-display {
    color: white;
    font-size: 1rem;
    background: rgba(255,255,255,0.2);
    padding: 6px 18px;
    border-radius: 20px;
  }

  /* ── Hidden ── */
  .hidden { display: none !important; }

  /* ── Celebration ── */
  .celebration {
    text-align: center;
    color: white;
    padding: 30px;
    animation: pop 0.4s ease;
  }

  .celebration .big-emoji { font-size: 5rem; }
  .celebration h2 { font-size: 1.8rem; margin: 12px 0 8px; }
  .celebration p  { font-size: 1rem; opacity: 0.9; }

  .reset-btn {
    margin-top: 18px;
    padding: 12px 32px;
    border: 2px solid white;
    border-radius: 30px;
    background: transparent;
    color: white;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { background: white; color: #764ba2; }
</style>
</head>
<body>

<h1>🌟 毎日ことばクイズ</h1>
<p class="subtitle">英語と韓国語のことばをおぼえよう！</p>
<div class="date-badge" id="dateBadge"></div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('learn')">📖 おぼえる</button>
  <button class="tab-btn"        onclick="showTab('quiz')">🎯 クイズ</button>
</div>

<!-- ── LEARN TAB ── -->
<div id="learnTab">
  <div class="progress-wrap">
    <div class="progress-label">
      <span>今日のことば</span>
      <span id="progressText">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<!-- ── QUIZ TAB ── -->
<div id="quizTab" class="hidden">
  <div class="score-display" id="scoreDisplay">スコア: 0 / 0</div>
  <br>
  <div class="quiz-wrap" id="quizWrap"></div>
</div>

<script>
// ─────────────────────────────────────────────
//  WORD DATA
// ─────────────────────────────────────────────
const ALL_WORDS = [
  // animals
  { jp:'いぬ',    en:'Dog',      enPh:'ドッグ',       kr:'개',    krPh:'ケ',      emoji:'🐶' },
  { jp:'ねこ',    en:'Cat',      enPh:'キャット',     kr:'고양이',krPh:'コヤンイ', emoji:'🐱' },
  { jp:'うさぎ',  en:'Rabbit',   enPh:'ラビット',     kr:'토끼',  krPh:'トッキ',   emoji:'🐰' },
  { jp:'くま',    en:'Bear',     enPh:'ベア',         kr:'곰',    krPh:'コム',     emoji:'🐻' },
  { jp:'さる',    en:'Monkey',   enPh:'モンキー',     kr:'원숭이',krPh:'ウォンスンイ',emoji:'🐵' },
  { jp:'ぞう',    en:'Elephant', enPh:'エレファント', kr:'코끼리',krPh:'コッキリ',  emoji:'🐘' },
  { jp:'きりん',  en:'Giraffe',  enPh:'ジラフ',       kr:'기린',  krPh:'キリン',   emoji:'🦒' },
  { jp:'とり',    en:'Bird',     enPh:'バード',       kr:'새',    krPh:'セ',       emoji:'🐦' },
  { jp:'さかな',  en:'Fish',     enPh:'フィッシュ',   kr:'물고기',krPh:'ムルゴギ',  emoji:'🐟' },
  { jp:'かえる',  en:'Frog',     enPh:'フロッグ',     kr:'개구리',krPh:'ケグリ',   emoji:'🐸' },
  // food
  { jp:'りんご',  en:'Apple',    enPh:'アップル',     kr:'사과',  krPh:'サグァ',   emoji:'🍎' },
  { jp:'バナナ',  en:'Banana',   enPh:'バナナ',       kr:'바나나', krPh:'バナナ',   emoji:'🍌' },
  { jp:'いちご',  en:'Strawberry',enPh:'ストロベリー',kr:'딸기',  krPh:'タルギ',   emoji:'🍓' },
  { jp:'すいか',  en:'Watermelon',enPh:'ウォーターメロン',kr:'수박',krPh:'スバク', emoji:'🍉' },
  { jp:'ぶどう',  en:'Grape',    enPh:'グレープ',     kr:'포도',  krPh:'ポド',     emoji:'🍇' },
  { jp:'パン',    en:'Bread',    enPh:'ブレッド',     kr:'빵',    krPh:'パン',     emoji:'🍞' },
  { jp:'ごはん',  en:'Rice',     enPh:'ライス',       kr:'밥',    krPh:'バプ',     emoji:'🍚' },
  { jp:'みず',    en:'Water',    enPh:'ウォーター',   kr:'물',    krPh:'ムル',     emoji:'💧' },
  { jp:'ケーキ',  en:'Cake',     enPh:'ケイク',       kr:'케이크',krPh:'ケイク',   emoji:'🎂' },
  { jp:'アイスクリーム',en:'Ice Cream',enPh:'アイスクリーム',kr:'아이스크림',krPh:'アイスクリム',emoji:'🍦' },
  // colors
  { jp:'あか',    en:'Red',      enPh:'レッド',       kr:'빨간색',krPh:'パルガンセク',emoji:'🔴' },
  { jp:'あお',    en:'Blue',     enPh:'ブルー',       kr:'파란색',krPh:'パランセク', emoji:'🔵' },
  { jp:'きいろ',  en:'Yellow',   enPh:'イエロー',     kr:'노란색',krPh:'ノランセク', emoji:'🟡' },
  { jp:'みどり',  en:'Green',    enPh:'グリーン',     kr:'초록색',krPh:'チョロクセク',emoji:'🟢' },
  { jp:'しろ',    en:'White',    enPh:'ホワイト',     kr:'흰색',  krPh:'フィンセク', emoji:'⚪' },
  // numbers
  { jp:'いち',    en:'One',      enPh:'ワン',         kr:'일',    krPh:'イル',     emoji:'1️⃣' },
  { jp:'に',      en:'Two',      enPh:'トゥー',       kr:'이',    krPh:'イ',       emoji:'2️⃣' },
  { jp:'さん',    en:'Three',    enPh:'スリー',       kr:'삼',    krPh:'サム',     emoji:'3️⃣' },
  { jp:'よん',    en:'Four',     enPh:'フォー',       kr:'사',    krPh:'サ',       emoji:'4️⃣' },
  { jp:'ご',      en:'Five',     enPh:'ファイブ',     kr:'오',    krPh:'オ',       emoji:'5️⃣' },
  // family
  { jp:'おかあさん',en:'Mother',  enPh:'マザー',       kr:'엄마',  krPh:'オンマ',   emoji:'👩' },
  { jp:'おとうさん',en:'Father',  enPh:'ファーザー',   kr:'아빠',  krPh:'アッパ',   emoji:'👨' },
  { jp:'おにいさん',en:'Brother', enPh:'ブラザー',     kr:'오빠/형',krPh:'オッパ/ヒョン',emoji:'👦' },
  { jp:'おねえさん',en:'Sister',  enPh:'シスター',     kr:'언니/누나',krPh:'オンニ/ヌナ',emoji:'👧' },
  { jp:'ともだち', en:'Friend',   enPh:'フレンド',     kr:'친구',  krPh:'チング',   emoji:'🤝' },
  // nature / things
  { jp:'たいよう', en:'Sun',      enPh:'サン',         kr:'태양',  krPh:'テヤン',   emoji:'☀️' },
  { jp:'つき',    en:'Moon',     enPh:'ムーン',       kr:'달',    krPh:'タル',     emoji:'🌙' },
  { jp:'ほし',    en:'Star',     enPh:'スター',       kr:'별',    krPh:'ピョル',   emoji:'⭐' },
  { jp:'はな',    en:'Flower',   enPh:'フラワー',     kr:'꽃',    krPh:'コッ',     emoji:'🌸' },
  { jp:'き',      en:'Tree',     enPh:'トゥリー',     kr:'나무',  krPh:'ナム',     emoji:'🌳' },
  { jp:'うみ',    en:'Sea',      enPh:'スィー',       kr:'바다',  krPh:'パダ',     emoji:'🌊' },
  { jp:'やま',    en:'Mountain', enPh:'マウンテン',   kr:'산',    krPh:'サン',     emoji:'⛰️' },
  { jp:'あめ',    en:'Rain',     enPh:'レイン',       kr:'비',    krPh:'ビ',       emoji:'🌧️' },
  { jp:'ゆき',    en:'Snow',     enPh:'スノー',       kr:'눈',    krPh:'ヌン',     emoji:'❄️' },
  { jp:'かぜ',    en:'Wind',     enPh:'ウィンド',     kr:'바람',  krPh:'パラム',   emoji:'💨' },
];

const ACCENT_COLORS = [
  '#667eea','#f093fb','#4facfe','#43e97b','#f7971e',
  '#fa709a','#30cfd0','#a18cd1','#fda085','#96fbc4',
];

// ─────────────────────────────────────────────
//  DAILY SELECTION (8 words per day)
// ─────────────────────────────────────────────
const WORDS_PER_DAY = 8;

function getDayIndex() {
  const start = new Date(2025, 0, 1);
  const now = new Date();
  return Math.floor((now - start) / 86400000);
}

function getTodayWords() {
  const day = getDayIndex();
  const offset = (day * WORDS_PER_DAY) % ALL_WORDS.length;
  const result = [];
  for (let i = 0; i < WORDS_PER_DAY; i++) {
    result.push(ALL_WORDS[(offset + i) % ALL_WORDS.length]);
  }
  return result;
}

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const todayWords = getTodayWords();
const learned = new Set(JSON.parse(localStorage.getItem('learned_' + getDayIndex()) || '[]'));

function saveLearnedState() {
  localStorage.setItem('learned_' + getDayIndex(), JSON.stringify([...learned]));
}

// ─────────────────────────────────────────────
//  DATE BADGE
// ─────────────────────────────────────────────
const d = new Date();
const weekdays = ['日','月','火','水','木','金','土'];
document.getElementById('dateBadge').textContent =
  `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${weekdays[d.getDay()]}）`;

// ─────────────────────────────────────────────
//  LEARN TAB
// ─────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  todayWords.forEach((w, i) => {
    const accent = ACCENT_COLORS[i % ACCENT_COLORS.length];
    const card = document.createElement('div');
    card.className = 'word-card' + (learned.has(i) ? ' learned' : '');
    card.style.setProperty('--accent', accent);
    card.innerHTML = `
      <div class="learned-badge">✓</div>
      <div class="emoji">${w.emoji}</div>
      <div class="jp-word">🇯🇵 <strong>${w.jp}</strong></div>
      <div class="lang-row">
        <span class="flag">🇺🇸</span>
        <div>
          <div class="word-text en-color">${w.en}</div>
          <div class="phonetic">（${w.enPh}）</div>
        </div>
      </div>
      <div class="lang-row">
        <span class="flag">🇰🇷</span>
        <div>
          <div class="word-text kr-color">${w.kr}</div>
          <div class="phonetic">（${w.krPh}）</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => {
      learned.add(i);
      card.classList.add('learned');
      saveLearnedState();
      updateProgress();
    });
    grid.appendChild(card);
  });
  updateProgress();
}

function updateProgress() {
  const count = learned.size;
  const total = todayWords.length;
  document.getElementById('progressText').textContent = `${count} / ${total}`;
  document.getElementById('progressBar').style.width = `${(count/total)*100}%`;
}

buildCards();

// ─────────────────────────────────────────────
//  QUIZ TAB
// ─────────────────────────────────────────────
let quizIndex = 0;
let quizOrder = [];
let quizScore = 0;
let quizTotal = 0;

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  quizOrder = shuffleArray(todayWords.map((_, i) => i));
  quizIndex = 0;
  quizScore = 0;
  quizTotal = 0;
  renderQuiz();
}

function optionHTML(w) {
  return `
    <span class="opt-en">🇺🇸 ${w.en}</span>
    <span class="opt-ph">（${w.enPh}）</span><br>
    <span class="opt-kr">🇰🇷 ${w.kr}</span>
    <span class="opt-ph">（${w.krPh}）</span>
  `;
}

function renderQuiz() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';

  if (quizIndex >= quizOrder.length) {
    const pct = Math.round((quizScore / quizTotal) * 100);
    let msg = pct === 100 ? '🎉 パーフェクト！すごい！' :
              pct >= 75  ? '😊 よくできました！'       :
              pct >= 50  ? '🙂 もう少しでパーフェクト！': '💪 もう一度やってみよう！';
    wrap.innerHTML = `
      <div class="celebration">
        <div class="big-emoji">${pct===100?'🏆':pct>=75?'⭐':'🌈'}</div>
        <h2>${msg}</h2>
        <p>スコア：${quizScore} / ${quizTotal}（${pct}%）</p>
        <button class="reset-btn" onclick="startQuiz()">もう一度チャレンジ！</button>
      </div>`;
    return;
  }

  const wi = quizOrder[quizIndex];
  const word = todayWords[wi];

  // 3 wrong options (different English AND Korean)
  const wrongPool = shuffleArray(
    ALL_WORDS.filter(w => w.en !== word.en && w.kr !== word.kr)
  ).slice(0, 3);

  const options = shuffleArray([
    { word: word, correct: true },
    ...wrongPool.map(w => ({ word: w, correct: false }))
  ]);

  const card = document.createElement('div');
  card.className = 'quiz-card';
  card.innerHTML = `
    <div class="quiz-question-emoji">${word.emoji}</div>
    <div class="quiz-question-text">${word.jp}</div>
    <div class="quiz-hint">🇺🇸 えいご と 🇰🇷 かんこくご は どれ？</div>
    <div class="quiz-options" id="quizOptions"></div>
  `;
  wrap.appendChild(card);

  const resultDiv = document.createElement('div');
  resultDiv.className = 'quiz-result hidden';
  wrap.appendChild(resultDiv);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn hidden';
  nextBtn.textContent = quizIndex + 1 < quizOrder.length ? 'つぎの もんだい →' : '結果をみる 🎉';
  nextBtn.onclick = () => { quizIndex++; renderQuiz(); };
  wrap.appendChild(nextBtn);

  const optContainer = card.querySelector('#quizOptions');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = optionHTML(opt.word);
    btn.onclick = () => {
      quizTotal++;
      optContainer.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      if (opt.correct) {
        btn.classList.add('correct');
        quizScore++;
        resultDiv.textContent = '⭕ 正解！すごい！';
        resultDiv.className = 'quiz-result ok';
      } else {
        btn.classList.add('wrong');
        optContainer.querySelectorAll('.option-btn').forEach((b, idx) => {
          if (options[idx].correct) b.classList.add('correct');
        });
        resultDiv.textContent = `❌ ざんねん！答えは「${word.en}（${word.enPh}）/ ${word.kr}（${word.krPh}）」`;
        resultDiv.className = 'quiz-result ng';
      }
      resultDiv.classList.remove('hidden');
      nextBtn.classList.remove('hidden');
      updateScoreDisplay();
    };
    optContainer.appendChild(btn);
  });
}

function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = `スコア: ${quizScore} / ${quizTotal}`;
}

// ─────────────────────────────────────────────
//  TAB SWITCHING
// ─────────────────────────────────────────────
function showTab(name) {
  document.getElementById('learnTab').classList.toggle('hidden', name !== 'learn');
  document.getElementById('quizTab').classList.toggle('hidden', name !== 'quiz');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && name === 'learn') || (i === 1 && name === 'quiz'));
  });
  if (name === 'quiz') { startQuiz(); }
}
</script>
